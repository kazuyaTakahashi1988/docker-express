services:
  mysql:
    image: mysql:8.4
    container_name: express-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-express_db}
      TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - ${MYSQL_DATA_DIR:-./.data/mysql8.4}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - docker-networks-express

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: express-phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT:-64M}
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - docker-networks-express

  dockerexpress:
    image: dockerexpress
    container_name: express-app
    build:
      context: app
      dockerfile: ./Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${APP_PORT:-3000}
      DB_HOST: mysql
      DB_PORT: ${MYSQL_PORT:-3306}
      DB_NAME: ${MYSQL_DATABASE:-express_db}
      DB_USER: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_DIALECT: mysql
      TZ: ${TZ:-Asia/Tokyo}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-local-env}
      APP_KEY: ${APP_KEY:-change-me-in-local-env}
      DB_SOCKET_PATH: ${DB_SOCKET_PATH:-}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GCS_UPLOAD_PREFIX: ${GCS_UPLOAD_PREFIX:-uploads}
      UPLOADS_BASE_URL: ${UPLOADS_BASE_URL:-/uploads}
      SITE_HOST: ${SITE_HOST:-https://default-hostname.run.app}
      DEFAULT_OGP_IMAGE_URL: ${DEFAULT_OGP_IMAGE_URL:-https://storage.googleapis.com/default-uploads/images/common/ogp.png}
      BUILD_PUSH_COUNT: ${BUILD_PUSH_COUNT:-local}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-5242880}
    ports:
      - "${APP_PORT:-3000}:3000"
    init: true
    volumes:
      - ./app:/usr/src/app
    command: sh -c "npm install && npm run dev"
    networks:
      - docker-networks-express

networks:
  docker-networks-express:
